<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23C3D809'/><text y='.9em' font-size='52' x='50%' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-weight='900' fill='%23222022'>RM</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --lime: #C3D809; --dark: #222022; --dark2: #1a181a; --text: #f5f5f0; --muted: #999899; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--dark2); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; overflow: hidden; }
    .bg-glow { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(195,216,9,0.08) 0%, transparent 70%); pointer-events: none; animation: pulse 4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.2)} }
    .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 900; color: var(--lime); margin-bottom: 3rem; letter-spacing: -1px; }
    .error-code { font-family: 'Space Grotesk', sans-serif; font-size: clamp(6rem, 20vw, 12rem); font-weight: 900; color: var(--lime); line-height: 1; letter-spacing: -8px; margin-bottom: 0.5rem; opacity: 0.15; }
    .error-emoji { font-size: 4rem; margin-bottom: 1.5rem; }
    .error-title { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 800; color: var(--text); margin-bottom: 0.8rem; letter-spacing: -1px; }
    .error-desc { color: var(--muted); font-size: 1rem; max-width: 420px; line-height: 1.8; margin-bottom: 2.5rem; }
    .error-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .btn-home { background: var(--lime); color: var(--dark); padding: 0.9rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 800; font-size: 0.95rem; transition: all 0.2s; }
    .btn-home:hover { background: #d4ec0a; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(195,216,9,0.4); }
    .btn-contact { background: transparent; color: var(--text); padding: 0.9rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.15); transition: all 0.2s; }
    .btn-contact:hover { border-color: var(--lime); color: var(--lime); transform: translateY(-2px); }
    .quick-links { margin-top: 3rem; display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .quick-link { color: var(--muted); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
    .quick-link:hover { color: var(--lime); }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="error-actions">
    <a href="index.html" class="btn-home">← Back to Portfolio</a>
    <a href="mailto:richardmanzi30@gmail.com" class="btn-contact">Contact Richard</a>
  </div>
  <div class="quick-links">
    <a href="index.html#projects" class="quick-link">Projects</a>
    <a href="index.html#services" class="quick-link">Services</a>
    <a href="index.html#contact" class="quick-link">Contact</a>
    <a href="https://wa.me/250782511514" target="_blank" class="quick-link">WhatsApp</a>
  </div>
</body>
</html>
